<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>نظام التحليل التنموي للمحافظات الأردنية</title><style>body{font-family:Tahoma,sans-serif;background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;direction:rtl}.box{text-align:center;background:#fff;padding:40px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);max-width:400px}.sp{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#1a3a5c;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 16px}@keyframes s{to{transform:rotate(360deg)}}h2{color:#1a3a5c;font-size:18px;margin-bottom:8px}p{color:#6b7280;font-size:13px;line-height:1.7}.btn{display:inline-block;margin-top:12px;padding:10px 24px;background:#1a3a5c;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:700}</style></head><body><div class="box"><div class="sp"></div><h2>جاري تحميل المنصة...</h2><p>سيتم توجيهك إلى لوحة البيانات التجريبية</p><a class="btn" href="dist/index.html?demo=true">📊 الذهاب إلى المنصة</a></div><script>window.location.href="dist/index.html?demo=true"</script></body></html>
